<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="tGold" x1="0%" y1="0%" x2="100%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
  </defs>
  <rect width="600" height="200" rx="16" fill="url(#tBg)"/>
  <!-- Border -->
  <rect x="3" y="3" width="594" height="194" rx="14" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.3"/>
  <rect x="8" y="8" width="584" height="184" rx="11" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.15"/>
