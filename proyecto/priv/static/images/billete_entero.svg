    <text y="55" font-family="monospace" font-size="12" fill="#94a3b8">ENTERO</text>
  </g>
  <!-- Right: Ticket info -->
  <text x="350" y="70" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle">BILLETE COMPLETO</text>
  <text x="350" y="100" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Todas las fracciones incluidas</text>
  <rect x="280" y="120" width="140" height="35" rx="8" fill="url(#tGold)" opacity="0.15"/>
  <text x="350" y="143" font-family="monospace" font-size="16" fill="#fbbf24" text-anchor="middle" font-weight="bold">100%</text>
  <!-- Corner decorations -->
