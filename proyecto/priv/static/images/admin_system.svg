<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="aGold" x1="0%" y1="0%" x2="100%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
  </defs>
  <rect width="800" height="400" rx="24" fill="url(#aBg)"/>
  <!-- Clock -->
  <g transform="translate(400, 170)">
    <circle r="100" fill="none" stroke="#334155" stroke-width="3"/>
    <circle r="95" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
    <!-- Hour markers -->
    <g fill="#fbbf24" opacity="0.5">
      <rect x="-2" y="-90" width="4" height="15" rx="2"/><rect x="-2" y="75" width="4" height="15" rx="2"/>
      <rect x="75" y="-2" width="15" height="4" rx="2"/><rect x="-90" y="-2" width="15" height="4" rx="2"/>
    </g>
    <!-- Hands -->
    <line x1="0" y1="0" x2="0" y2="-65" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="45" y2="-35" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <circle r="6" fill="#fbbf24"/>
    <!-- Forward arrows -->
    <g transform="translate(130, -10)" fill="#fbbf24" opacity="0.6">
      <path d="M0 0 L20 0 L15 -8 M20 0 L15 8"/><path d="M25 0 L45 0 L40 -8 M45 0 L40 8"/>
    </g>
  </g>
  <!-- Timeline -->
  <g transform="translate(100, 330)">
    <line x1="0" y1="0" x2="600" y2="0" stroke="#334155" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#334155"/><circle cx="200" cy="0" r="6" fill="#334155"/>
    <circle cx="400" cy="0" r="8" fill="#fbbf24"/><circle cx="600" cy="0" r="6" fill="#10b981"/>
    <text x="0" y="25" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Ayer</text>
    <text x="200" y="25" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Hoy</text>
    <text x="400" y="25" font-family="sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">Avanzar</text>
    <text x="600" y="25" font-family="sans-serif" font-size="11" fill="#10b981" text-anchor="middle">Futuro</text>
  </g>
  <text x="400" y="45" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle" opacity="0.6">Simulación del Tiempo</text>
</svg>
